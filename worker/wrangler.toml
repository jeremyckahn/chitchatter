name = "chitchatter-signaling"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[durable_objects]
bindings = [
  { name = "SIGNALING_ROOM", class_name = "SignalingRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SignalingRoom"]

[vars]
# 允许访问的前端域名（逗号分隔）
# 除了 .pages.dev 和 localhost 自动允许外，自定义域名需要在这里添加
# 示例: "https://chat.example.com,https://www.example.com"
ALLOWED_ORIGINS = "https://chat.cn9.eu"

# Cloudflare TURN 服务配置（通过 wrangler secret 设置）:
#   npx wrangler secret put TURN_KEY_ID
#   npx wrangler secret put TURN_KEY_API_TOKEN
#
# Cloudflare SFU 服务配置（通过 wrangler secret 设置）:
#   npx wrangler secret put SFU_APP_ID
#   npx wrangler secret put SFU_APP_SECRET

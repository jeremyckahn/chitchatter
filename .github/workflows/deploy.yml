name: Deploy to Github Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

# 1. ADDED THIS BLOCK: Grants the automatic token permission to push to the gh-pages branch
permissions:
  contents: write

jobs:
  deployment:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Build
        env:
          VITE_RTC_CONFIG_ENDPOINT: ${{ vars.VITE_RTC_CONFIG_ENDPOINT }}
        run: |
          npm ci
          npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          # 2. CHANGED THIS LINE: Swapped out deploy_key for the automatic github_token
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

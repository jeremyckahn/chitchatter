name: CI

on:
  push:
    branches:
      - '**'

jobs:
  test_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run check:types
      - run: npm test

      - name: Build web app
        run: npm run build:app
